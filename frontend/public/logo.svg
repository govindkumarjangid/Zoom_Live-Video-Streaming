<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" className="w-full h-full max-w-md drop-shadow-2xl">
  <defs>
    {/* Animated Moving Gradient */}
    <linearGradient id="avcGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#f98f46">
        <animate attributeName="stop-color" values="#f98f46; #d96c16; #b05611; #f98f46" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stopColor="#d96c16">
        <animate attributeName="stop-color" values="#d96c16; #b05611; #f98f46; #d96c16" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stopColor="#b05611">
        <animate attributeName="stop-color" values="#b05611; #f98f46; #d96c16; #b05611" dur="3s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  {/* Dark Theme Background */}
  <rect width="500" height="500" rx="100" fill="#120e1a" />

  {/* Rotating Tech Ring */}
  <circle cx="250" cy="250" r="210" fill="none" stroke="url(#avcGradient)" strokeWidth="6" strokeDasharray="15 20">
     <animateTransform attributeName="transform" type="rotate" from="0 250 250" to="360 250 250" dur="20s" repeatCount="indefinite" />
  </circle>

  {/* Large, Bold AVC Text */}
  <text x="250" y="210" fontFamily="system-ui, sans-serif" fontSize="500" fontWeight="900" fill="url(#avcGradient)" textAnchor="middle" letterSpacing="4">
    AVC
  </text>

  {/* Video Camera Icon */}
  <g fill="url(#avcGradient)" transform="translate(198, 250) scale(1.6)">
    <rect x="0" y="10" width="40" height="30" rx="8" />
    <path d="M45 20 L60 10 C62 8 65 10 65 13 L65 37 C65 40 62 42 60 40 L45 30 Z" />
  </g>
</svg>